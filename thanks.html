<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Thanks — ADK Digital</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
  <style>
    .thanks-wrap{min-height:calc(100vh - 140px);display:grid;place-items:center;padding:4rem 1rem;text-align:center}
    .thanks-card{max-width:720px;background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:2rem}
    .thanks-card h1{margin:.25rem 0 0}
    .thanks-card p{color:var(--muted)}
    .thanks-actions{margin-top:1rem;display:flex;gap:.75rem;justify-content:center}
    .button{--bg1: var(--brand-500); --bg2: var(--brand-600);display:inline-block;padding:.75rem 1.1rem;border-radius:12px;color:#fff;font-weight:700;text-align:center;background:linear-gradient(180deg,var(--bg1),var(--bg2));box-shadow:0 6px 14px rgba(0,0,0,.35)}
    .button:hover{filter:saturate(1.05)}
  </style>
</head>
<body>
  <main class="thanks-wrap">
    <section class="thanks-card" role="status" aria-live="polite">
      <svg width="56" height="56" viewBox="0 0 24 24" fill="none" aria-hidden="true" style="margin-inline:auto;display:block">
        <path d="M9 12l2 2 4-4" stroke="#2ecc71" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="12" cy="12" r="9" stroke="rgba(255,255,255,.3)" stroke-width="2"/>
      </svg>
      <h1>Thanks! We&rsquo;ll be in touch shortly.</h1>
      <p>We received your message and will get back to you as soon as possible.</p>
      <div class="thanks-actions">
        <a class="button" href="/">Return Home</a>
        <a class="button" href="/#services">See Services</a>
      </div>
    </section>
  </main>
</body>
</html>
